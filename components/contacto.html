<footer id="contacto" class="contact-footer">
      <div class="container">
        <h2>Contacto</h2>

        <form
          action="https://formspree.io/f/xanpbljj"
          method="POST"
          class="contact-form"
        >
          <input
            type="hidden"
            name="_subject"
            value="Contacto de Portfolio - Jean Pierre"
          />

          <div class="form-group">
            <label for="user-email"
              >Tu Correo Electrónico (para responderte):</label
            >
            <input
              type="email"
              id="user-email"
              name="Correo_Usuario"
              placeholder="ejemplo@correo.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="asunto">Asunto:</label>
            <input
              type="text"
              id="asunto"
              name="Asunto_del_Mensaje"
              placeholder="Me gustaría hablar de un proyecto..."
              required
            />
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje:</label>
            <textarea
              id="mensaje"
              name="Mensaje"
              rows="5"
              placeholder="Escribe tu mensaje aquí..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-primary">Enviar Mensaje</button>
          <p class="form-note">
            ✅ ¡Este formulario enviará un email directo a tu bandeja!
          </p>
        </form>

        <p class="separator-text">
          También me puedes contactar por estos sitios:
        </p>

        <div class="contact-links">
          <a
            href="https://wa.me/+5491126999741"
            target="_blank"
            aria-label="WhatsApp"
          >
            <img
              src="redes/wss.png"
              alt="Icono de WhatsApp"
              class="contact-icon-img"
            />
          </a>

          <a
            href="https://mail.google.com/mail/?view=cm&fs=1&to=jeanpierreesquen@gmail.com&su=Asunto&body=Mensaje"
            target="_blank"
            aria-label="Gmail"
          >
            <img
              src="redes/gmail.png"
              alt="Icono de Gmail"
              class="contact-icon-img"
            />
          </a>

          <a
            href="https://www.linkedin.com/in/jeanesquen"
            target="_blank"
            aria-label="LinkedIn"
          >
            <img
              src="redes/linkk.png"
              alt="Icono de LinkedIn"
              class="contact-icon-img"
            />
          </a>

          <a
            href="https://github.com/Jean5011"
            target="_blank"
            aria-label="GitHub"
          >
            <img
              src="redes/git.ico"
              alt="Icono de GitHub"
              class="contact-icon-img"
            />
          </a>

          <a
            href="https://www.instagram.com/jp_esquen/"
            target="_blank"
            aria-label="Instagram"
          >
            <img
              src="redes/inst.png"
              alt="Icono de Instagram"
              class="contact-icon-img"
            />
          </a>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2026 Jean Pierre Esquen. Todos los derechos reservados.</p>
        </div>
      </div>
    </footer>
